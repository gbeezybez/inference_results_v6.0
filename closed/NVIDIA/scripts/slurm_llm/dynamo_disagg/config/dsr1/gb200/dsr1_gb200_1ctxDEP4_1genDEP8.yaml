# DeepSeek-R1 GB200: 1 CTX DEP4 + 1 GEN DEP8
# Experiment: 1ctxDEP4+1genDEP8_qps_3.5
#
# Node allocation:
#   - 1 CTX worker @ DEP4 (4 GPUs = 1 node)
#   - 1 GEN worker @ DEP8 (8 GPUs = 2 nodes)
#   - Total: 3 nodes

benchmark: deepseek-r1
scenario: Interactive

disagg_cluster:
  num_prefill_workers: 1
  num_decode_workers: 1
  system: GB200-NVL72_GB200-186GB_aarch64x4  # Frontend system
  # num_clusters: 1    # Optional: explicit number of clusters (default: auto from nodes)
  # num_frontends: 1   # Optional: number of frontend replicas per cluster (default: 1)
  # frontend:          # Optional: frontend-specific configuration
  #   router_mode: round-robin  # Options: round-robin, kv, random
  #   kv_overlap_weight: 1.0    # For KV router mode (0.0-1.0), defaults to 1.0 if kv mode
  #   num_frontends: 4          # Can also be specified here

prefill:
  system: GB200-NVL72_GB200-186GB_aarch64x4
  gpus_per_worker: 4
  gpus_per_node: 4
  config: /work/scripts/slurm_llm/dynamo_disagg/config/dsr1/gb200/dsr1_gb200_ctx_DEP4.yaml
  env_vars: scripts/slurm_llm/dynamo_disagg/config/dsr1/trtllm_env.yaml

decode:
  system: GB200-NVL72_GB200-186GB_aarch64x8
  gpus_per_worker: 8
  gpus_per_node: 4
  config: /work/scripts/slurm_llm/dynamo_disagg/config/dsr1/gb200/dsr1_gb200_gen_DEP8.yaml
  env_vars: scripts/slurm_llm/dynamo_disagg/config/dsr1/trtllm_env.yaml
