# MLPerf Inference v5.0 Configuration File
# The format of this config file is 'key = value'.
# The key has the format 'model.scenario.key'. Value is mostly int64_t.
# Model may be '*' as wildcard. In that case the value applies to all models.
# All times are in milliseconds

# Set performance_sample_count for each model
*.*.performance_sample_count = 1024

# v5.0 Random number generator seeds
*.*.qsl_rng_seed = 6023615788873153749
*.*.sample_index_rng_seed = 15036839855038426416
*.*.schedule_rng_seed = 9933818062894767841

# Test05 seeds (for compliance tests)
*.*.test05_qsl_rng_seed = 7975553102935885558
*.*.test05_sample_index_rng_seed = 11403566307062068064
*.*.test05_schedule_rng_seed = 15816800565822761601

# Whisper model specific settings
whisper.*.performance_sample_count = 1633
#whisper.*.min_query_count = 1633
whisper.*.min_duration = 600000
whisper.*.use_token_latencies = 1

# Offline scenario
*.Offline.target_qps = 60
*.Offline.target_latency = 0
*.Offline.min_query_count = 1

# Server scenario
*.Server.target_qps = 1
*.Server.target_latency = 1000

# SingleStream scenario
*.SingleStream.target_latency = 0
*.SingleStream.min_query_count = 1024
