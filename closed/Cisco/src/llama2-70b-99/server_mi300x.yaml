# benchmark details
benchmark_name: llama2-70b
scenario: server
test_mode: performance
engine_version: async

vllm_env_config:
  VLLM_LOGGING_LEVEL: "ERROR"
  AITER_LOG_LEVEL: "ERROR"
  HARNESS_GC_LIMIT: 100000
  RAY_EXPERIMENTAL_NOSET_ROCR_VISIBLE_DEVICES: 1
  VLLM_USE_V1: 1
  VLLM_ROCM_USE_AITER: 1
  USE_FASTSAFETENSOR: 1
  SAFETENSORS_FAST_GPU: 1
  VLLM_ROCM_USE_AITER_RMSNORM: 1
  VLLM_ROCM_USE_AITER_MHA: 1
  VLLM_ROCM_USE_AITER_FP4_ASM_GEMM: 1
  # VLLM_MIN_REQUEST_DECODE_STEP: 2560
  # VLLM_SUBSEQUENT_DECODE_STEPS: 19
  VLLM_ROCM_USE_AITER_TRITON_ROPE: 1
  GPU_MAX_HW_QUEUES: 2

# configuration related to the LLM model.
vllm_engine_config:
  model: /model/llama2-70b-chat-hf/fp8_quantized
  tensor_parallel_size: 1
  quantization: fp8
  max_model_len: 2048
  swap_space: 0
  gpu_memory_utilization: 0.9
  compilation_config:
    cudagraph_mode: FULL_AND_PIECEWISE
    compile_sizes: [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048]
    # cudagraph_capture_sizes is generated from cudagraph_capture_range
    cudagraph_capture_range: [[2048, 0, -8], 4, 2, 1]
  enforce_eager: True
  disable_custom_all_reduce: True
  max_num_batched_tokens: 40960
  max_num_seqs: 650
  enable_chunked_prefill: True
  block_size: 16
  enable_prefix_caching: False
  disable_log_stats: True
  dtype: bfloat16
  async_scheduling: True

# configuration related to the sampling params
vllm_sampling_config:
  temperature: 0.0
  min_tokens: 1
  max_tokens: 1024
  ignore_eos: False
  detokenize: False

# configuration related to the harness tests.
harness_config:
  dataset_path: /data/processed-openorca/open_orca_gpt4_tokenized_llama.sampled_24576.pkl
  mlperf_conf_path: /lab-mlperf-inference/mlperf_inference/mlperf.conf
  user_conf_path: /lab-mlperf-inference/code/llama2-70b-99/user_mi300x.conf
  target_qps: -1
  total_sample_count: 24576
  output_log_dir: /lab-mlperf-inference/logs
  enable_log_trace: False
  enable_warmup: True
  device_count: 8
  schedule_algo: shortest_queue_with_tokens
  load_balance_token_weight: 0.009
  load_balance_window_size: 12
  sorting:
    strategy: ignore
