# The format of this config file is 'key = value'.
# The key has the format 'model.scenario.key'. Value is mostly int64_t.
# Model maybe '*' as wildcard. In that case the value applies to all models.
# All times are in milli seconds

# ============================================================================
# SingleStream Scenario (Edge category)
# ============================================================================
# target_latency: Set to your measured 90th percentile latency
# Measured: ~30,756 ms (30.756 seconds per video)
wan-2.2-t2v-a14b.SingleStream.target_latency = 31000

# min_duration: Minimum test duration (default: 600000 ms = 10 minutes)
# You can optionally override this for faster testing, but official submission
# requires 600 seconds minimum
# wan-2.2-t2v-a14b.SingleStream.min_duration = 600000

# ============================================================================
# Offline Scenario (Edge or Datacenter category)
# ============================================================================
# target_qps: Set to your measured throughput in samples/second
# Measured: ~0.03 samples/sec (1 video per ~30 seconds)
wan-2.2-t2v-a14b.Offline.target_qps = 0.03

# min_duration: Minimum test duration (default: 600000 ms = 10 minutes)
# wan-2.2-t2v-a14b.Offline.min_duration = 600000

# min_query_count: Minimum number of samples to process
# Default from mlperf.conf: 248 (matches dataset size)
# wan-2.2-t2v-a14b.Offline.min_query_count = 248

# ============================================================================
# Performance Sample Count
# ============================================================================
# Already set in mlperf.conf: wan-2.2-t2v-a14b.*.performance_sample_count_override = 248
# Only override if you need a different value
# wan-2.2-t2v-a14b.*.performance_sample_count_override = 247