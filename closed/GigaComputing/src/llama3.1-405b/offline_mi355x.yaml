# benchmark details
benchmark_name: llama3_1-405b
scenario: offline
test_mode: performance
backend: vllm

vllm_env_config:
  VLLM_LOGGING_LEVEL: "ERROR"
  HARNESS_GC_LIMIT: 100000
  NCCL_MIN_NCHANNELS: 112
  RAY_EXPERIMENTAL_NOSET_ROCR_VISIBLE_DEVICES: 1
  TOKENIZERS_PARALLELISM: False
  VLLM_INSTALL_PUNICA_KERNELS: 1
  VLLM_USE_V1: 1
  VLLM_TRITON_FP4_GEMM_USE_ASM: 0
  VLLM_TRITON_FP4_GEMM_SPLITK_USE_BF16: 0
  TRITON_HIP_ASYNC_COPY_BYPASS_PERMUTE: 1
  AMDGCN_USE_BUFFER_OPS: 1
  TRITON_HIP_USE_ASYNC_COPY: 1
  TRITON_HIP_USE_BLOCK_PINGPONG: 1
  TRITON_HIP_ASYNC_FAST_SWIZZLE: 1
  TRITON_HIP_PRESHUFFLE_SCALES: 1
  VLLM_ROCM_USE_AITER: 1
  VLLM_ROCM_USE_AITER_PAGED_ATTN: 0
  VLLM_ROCM_QUICK_REDUCE_QUANTIZATION: INT4
  VLLM_ROCM_QUICK_REDUCE_MAX_SIZE_BYTES_MB: 2560
  VLLM_ROCM_USE_AITER_CUSTOM_ALL_REDUCE: 1
  USE_FASTSAFETENSOR: 1
  SAFETENSORS_FAST_GPU: 1
  VLLM_ROCM_USE_AITER_RMSNORM: 1
  VLLM_USE_TRITON_FLASH_ATTN: 0
  VLLM_USE_AITER_TRITON_ROPE: 1
  VLLM_USE_AITER_TRITON_SILU_MUL: 1
  VLLM_TRITON_FP4_GEMM_BPRESHUFFLE: 1
  HARNESS_PRELOAD_AITER_KERNELS: 0
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 0
  VLLM_V1_USE_PREFILL_DECODE_ATTENTION: 0
  VLLM_USE_AITER_UNIFIED_ATTENTION: 0
  VLLM_ROCM_USE_AITER_MHA: 1
  VLLM_ROCM_USE_AITER_FP4_ASM_GEMM: 1
  VLLM_MIN_REQUEST_DECODE_STEP: 32
  VLLM_SUBSEQUENT_DECODE_STEPS: 11
  AITER_LOG_LEVEL: "ERROR"
  #VLLM_SCHED_PREFILL_KVC_FREEPCT: 0.75
  #VLLM_USE_WEIGHT_STREAMING: true
  #RCCL_MSCCL_ENABLE: 1
  #NCCL_NSOCKS_PERTHREAD: 4
  #NCCL_SOCKET_NTHREADS: 4
  #RCCL_MSCCL_ENABLE: 1

# configuration related to the LLM model.
vllm_engine_config:
  model: /model/llama3.1-405b/fp4_quantized
  dtype: bfloat16
  tensor_parallel_size: 2
  pipeline_parallel_size: 1
  quantization: quark
  max_model_len: 22512
  gpu_memory_utilization: 0.95
  enforce_eager: False
  disable_custom_all_reduce: False #need to set it as False to use QuickReduce feature
  max_num_batched_tokens: 20162
  max_num_seqs: 1024
  async_scheduling: True
  enable_chunked_prefill: True
  enable_prefix_caching: False
  disable_log_stats: False
  block_size: 16
  kv_cache_dtype: fp8
  #compilation_config:
    #cudagraph_mode: FULL_AND_PIECEWISE
    #compile_sizes: [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384]
    # cudagraph_capture_sizes is generated from cudagraph_capture_range
    # cudagraph_capture_range: [1, 2, 4, 8, 16, [32, 24001, 32]]

# configuration related to the sampling params
vllm_sampling_config:
  temperature: 1
  seed: 42
  top_p: 1
  top_k: 1
  max_tokens: 2000
  min_tokens: 2
  ignore_eos: False
  detokenize: False
  repetition_penalty: 1.0

# configuration related to the harness tests.
harness_config:
  dataset_path: /data/llama3.1-405b/mlperf_llama3.1_405b_dataset_8313_processed_fp16_eval.pkl
  mlperf_conf_path: /lab-mlperf-inference/mlperf_inference/mlperf.conf
  user_conf_path: /lab-mlperf-inference/code/llama3.1-405b/user_mi355x.conf
  target_qps: -1
  total_sample_count: 8313
  output_log_dir: /lab-mlperf-inference/logs
  load_balance_token_weight: 0.005
  enable_log_trace: False
  warmup_duration: 0
  enable_warmup: True
  warm_up_sample_count_per_server: 20
  sorting:
    strategy: batchpacking
  schedule_algo: shortest_queue_with_tokens
  device_count: 8
  duration_sec: -1
  debug_dump_model_output: False
